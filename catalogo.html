<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo SolarCharge</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
}

header{
background:#023047;
color:white;
text-align:center;
padding:40px;
}

.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:40px;
}

.card{
background:white;
width:300px;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

.precio{
font-size:25px;
color:#ffb703;
font-weight:bold;
}

.btn{
display:inline-block;
background:#ffb703;
padding:10px 20px;
text-decoration:none;
border-radius:20px;
color:black;
font-weight:bold;
}

</style>

</head>

<body>

<header>
<h1>Catálogo SolarCharge</h1>
<p>Encuentra el modelo ideal para ti</p>
</header>

<div class="cards">

<div class="card">
<img src="https://images.unsplash.com/photo-1609091839311-d5365f9ff1c5?w=500">
<h2>SolarCharge Mini</h2>
<p>Ideal para viajes cortos.</p>
<p class="precio">$799</p>
<a href="#" class="btn">Más Información</a>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1584277261846-c6a1672ed979?w=500">
<h2>SolarCharge Pro</h2>
<p>Mayor batería y carga rápida.</p>
<p class="precio">$1,299</p>
<a href="#" class="btn">Más Información</a>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1593941707882-a56bbc8df0e1?w=500">
<h2>SolarCharge Max</h2>
<p>Máxima potencia para aventuras largas.</p>
<p class="precio">$1,999</p>
<a href="#" class="btn">Más Información</a>
</div>

</div>

</body>
</html>
